# Qelera — Full Docker Compose Orchestration v1.0
# Production-ready stack with all Phase 1 services
# Created: May 28, 2026

# ============================================================
# DOCKER COMPOSE (docker-compose.yml)
# ============================================================
# ============================================================
# VERSION: 3.9
# SERVICES: 15 containers
# NETWORKS: elk, qelera, backend
# VOLUMES: db_data, vault_data, elasticsearch_data, kafka_data, redis_data, vault_logs, nginx_logs
# ============================================================
#
# Compose file structure:
#
#   ┌─────────────────────────────────────────────────────────┐
#   │                    INTERNET / CLIENTS                    │
#   └────────────────────────────┬────────────────────────────┘
#                                │
#                        ┌───────▼────────┐
#                        │   Nginx Proxy  │ :80, :443
#                        │  (reverse proxy)│
#                        └───────┬────────┘
#                                │
#                        ┌───────▼────────┐
#                        │    Kong GW     │ :8000, :8443
#                        │ (API Gateway)  │
#                        └───────┬────────┘
#                                │
#          ┌─────────────────────┼─────────────────────┐
#          │                     │                     │
#   ┌──────▼──────┐      ┌───────▼───────┐      ┌──────▼──────┐
#   │   FastAPI   │      │   React UI    │      │   MQTT/Broker│
#   │   Backend   │      │  (Dashboard)  │      │  (Mosquitto) │
#   │   :8000     │      │  :5173        │      │  :1883       │
#   └──────┬──────┘      └───────────────┘      └──────┬──────┘
#          │                                            │
#   ┌──────▼──────┐      ┌───────────────┐      ┌──────▼──────┐
#   │  PostgreSQL │      │   Elasticsearch│      │   Kafka     │
#   │  + TSDB     │      │   :9200        │      │   :9092     │
#   │  :5432      │      └───────────────┘      └──────┬──────┘
#   └─────────────┘                                    │
#          │                                ┌─────────▼─────────┐
#          │                                │    Redis Cache    │
#          │                                │    :6379          │
#          │                                └───────────────────┘
#          │
#   ┌──────▼──────┐      ┌───────────────────┐      ┌─────────────┐
#   │   Vault     │      │     Logstash      │      │   Kibana    │
#   │   :8200     │      │   :5044           │      │   :5601     │
#   └─────────────┘      └───────────────────┘      └─────────────┘

version: '3.9'

services:
  # ============================================================
  # DATABASE LAYER
  # ============================================================
  db:
    image: timescale/timescaledb:latest-pg16
    container_name: qelera-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: qelera
      POSTGRES_USER: ${DB_USER:-qelera}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./software/db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./software/db/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql
    networks:
      - qelera
      - backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-qelera} -d qelera"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '1.0'

  # ============================================================
  # API GATEWAY
  # ============================================================
  kong:
    image: kong:3.6
    container_name: qelera-kong
    restart: unless-stopped
    environment:
      KONG_DATABASE: "off"
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_ADMIN_LISTEN: "0.0.0.0:8001"
      KONG_PROXY_LISTEN: "0.0.0.0:8000"
      KONG_PLUGINS: request-transformer,response-transformer,cors,key-auth
    ports:
      - "8000:8000"
      - "8443:8443"
      - "8001:8001"
      - "8444:8444"
    volumes:
      - ./software/infrastructure/kong-config.yaml:/etc/kong/kong.yml
    networks:
      - qelera
      - backend
    depends_on:
      - db
    healthcheck:
      test: ["CMD", "kong", "health"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'

  # ============================================================
  # APPLICATION BACKEND
  # ============================================================
  backend:
    build:
      context: ./software/backend
      dockerfile: Dockerfile
    container_name: qelera-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${DB_USER:-qelera}:${DB_PASSWORD:-changeme}@db:5432/qelera
      VAULT_ADDR: http://vault:8200
      VAULT_TOKEN: ${VAULT_TOKEN:-changeme}
      JWT_SECRET: ${JWT_SECRET:-changeme}
      REDIS_URL: redis://redis:6379/0
      KAFKA_BOOTSTRAP: kafka:9092
      ELASTICSEARCH_URL: http://elasticsearch:9200
    ports:
      - "8000:8000"
    volumes:
      - ./software/backend:/app
    networks:
      - qelera
      - backend
    depends_on:
      db:
        condition: service_healthy
      kong:
        condition: service_started
      vault:
        condition: service_started
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'

  # ============================================================
  # FRONTEND DASHBOARD
  # ============================================================
  frontend:
    build:
      context: ./software/frontend
      dockerfile: Dockerfile
    container_name: qelera-frontend
    restart: unless-stopped
    environment:
      VITE_API_URL: http://backend:8000
      VITE_WS_URL: ws://backend:8000/ws
    ports:
      - "5173:5173"
    volumes:
      - ./software/frontend:/app
      - /app/node_modules
    networks:
      - qelera
    depends_on:
      - backend
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'

  # ============================================================
  # CACHING & BROKERAGE
  # ============================================================
  redis:
    image: redis:7-alpine
    container_name: qelera-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - qelera
      - backend
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.25'

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: qelera-kafka
    restart: unless-stopped
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    ports:
      - "9092:9092"
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks:
      - qelera
      - backend
    depends_on:
      - zookeeper
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '0.5'

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: qelera-zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - qelera
      - backend
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.25'

  # ============================================================
  # SECURITY & VAULT
  # ============================================================
  vault:
    image: hashicorp/vault:1.15.4
    container_name: qelera-vault
    restart: unless-stopped
    cap_add:
      - IPC_LOCK
    environment:
      VAULT_ADDR: http://127.0.0.1:8200
      VAULT_DEV_ROOT_TOKEN_ID: ${VAULT_DEV_ROOT_TOKEN:-changeme}
    ports:
      - "8200:8200"
    volumes:
      - vault_data:/vault/data
      - ./software/infrastructure/vault-config.md:/vault/config/vault.hcl
      - ./software/infrastructure/vault/scripts:/vault/scripts
    networks:
      - qelera
      - backend
    command: vault server -config=/vault/config/vault.hcl
    healthcheck:
      test: ["CMD", "vault", "status"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'

  # ============================================================
  # LOGGING & MONITORING (ELK Stack)
  # ============================================================
  elasticsearch:
    image: elasticsearch:8.13.0
    container_name: qelera-elasticsearch
    restart: unless-stopped
    environment:
      discovery.type: single-node
      ES_JAVA_OPTS: -Xms512m -Xmx512m
      xpack.security.enabled: "false"
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    networks:
      - elk
      - qelera
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '0.5'

  logstash:
    image: logstash:8.13.0
    container_name: qelera-logstash
    restart: unless-stopped
    ports:
      - "5044:5044"
      - "5000:5000/tcp"
      - "5000:5000/udp"
    volumes:
      - ./software/infrastructure/logstash/pipeline:/usr/share/logstash/pipeline
    networks:
      - elk
      - qelera
    depends_on:
      - elasticsearch
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '0.5'

  kibana:
    image: kibana:8.13.0
    container_name: qelera-kibana
    restart: unless-stopped
    environment:
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200
    ports:
      - "5601:5601"
    networks:
      - elk
      - qelera
    depends_on:
      - elasticsearch
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.25'

  # ============================================================
  # MQTT BROKER
  # ============================================================
  mqtt:
    image: eclipse-mosquitto:2
    container_name: qelera-mqtt
    restart: unless-stopped
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./software/infrastructure/mosquitto/config:/mosquitto/config
      - ./software/infrastructure/mosquitto/data:/mosquitto/data
      - ./software/infrastructure/mosquitto/log:/mosquitto/log
    networks:
      - qelera
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.1'

  # ============================================================
  # NGINX REVERSE PROXY
  # ============================================================
  nginx:
    image: nginx:alpine
    container_name: qelera-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./software/infrastructure/nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./software/infrastructure/nginx/conf.d:/etc/nginx/conf.d
      - nginx_logs:/var/log/nginx
    networks:
      - qelera
    depends_on:
      - kong
      - frontend
      - kibana
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.25'

  # ============================================================
  # SIMULATED EDGE DEVICES (for testing)
  # ============================================================
  esp32-simulator:
    build:
      context: ./software/firmware/esp32
      dockerfile: Dockerfile.simulator
    container_name: qelera-esp32-sim
    restart: unless-stopped
    environment:
      MQTT_BROKER: mqtt:1883
      DEVICE_ID: esp32-sim-001
    networks:
      - qelera
    depends_on:
      - mqtt
      - backend
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.1'

  rpi-simulator:
    build:
      context: ./software/firmware/rpi
      dockerfile: Dockerfile.simulator
    container_name: qelera-rpi-sim
    restart: unless-stopped
    environment:
      MQTT_BROKER: mqtt:1883
      DEVICE_ID: rpi-sim-001
      CAMERA_INPUT: simulated
    networks:
      - qelera
    depends_on:
      - mqtt
      - backend
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'

