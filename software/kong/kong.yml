# Qelera — Kong Gateway Configuration v1.0
# Kong 3.6+ compatible
# Created: May 28, 2026

_format_version: "3.0"
_transform: true

# ============================================================
# SERVICES
# ============================================================

services:
  # --- FastAPI Backend API ---
  - name: backend-api
    url: http://backend:8000
    protocols:
      - https
    connect_timeout: 5000
    write_timeout: 60000
    read_timeout: 60000
    retries: 3
    routes:
      - name: backend-api-public
        paths:
          - /api/v1
        methods:
          - GET
          - POST
          - PUT
          - DELETE
          - PATCH
        strip_path: false
        preserve_host: true
        protocols:
          - https
      - name: backend-api-health
        paths:
          - /health
          - /healthz
        methods:
          - GET
        strip_path: true
        preserve_host: true

  # --- WebSocket Real-time Service ---
  - name: websocket-service
    url: http://websocket:8765
    protocols:
      - wss
    connect_timeout: 5000
    routes:
      - name: websocket-realtime
        paths:
          - /ws
        protocols:
          - wss
        strip_path: false
        preserve_host: true

  # --- Kafka Admin (internal) ---
  - name: kafka-admin
    url: http://kafka:9092
    protocols:
      - http
    routes:
      - name: kafka-admin-internal
        paths:
          - /kafka-admin
        strip_path: true
        preserve_host: true

  # --- Redis Insight (internal monitoring) ---
  - name: redis-insight
    url: http://redis-insight:8001
    protocols:
      - http
    routes:
      - name: redis-insight-internal
        paths:
          - /redis-insight
        strip_path: true
        preserve_host: true

  # --- Kibana Dashboard ---
  - name: kibana-dashboard
    url: http://kibana:5601
    protocols:
      - http
    routes:
      - name: kibana-dashboard
        paths:
          - /kibana
        strip_path: true
        preserve_host: true

  # --- Vault Admin UI ---
  - name: vault-ui
    url: http://vault:8200
    protocols:
      - https
    routes:
      - name: vault-admin-ui
        paths:
          - /vault
        strip_path: true
        preserve_host: true

  # --- Grafana Monitoring ---
  - name: grafana-dashboard
    url: http://grafana:3000
    protocols:
      - http
    routes:
      - name: grafana-dashboard
        paths:
          - /grafana
        strip_path: true
        preserve_host: true

# ============================================================
# PLUGINS
# ============================================================

plugins:
  # --- Global Rate Limiting ---
  - name: rate-limiting
    config:
      minute: 1000
      hour: 50000
      policy: redis
      redis:
        host: redis
        port: 6379
        database: 0
        timeout: 2000
      limit_by: client_ip  # Also support: consumer, credential, header

  # --- JWT Authentication ---
  - name: jwt
    config:
      uri_param_names:
        - jwt
      claims_to_verify:
        - exp
      key_claim_name: iss
      secret_is_base64: false
      run_on_preflight: true

  # --- Key Authentication (API Keys) ---
  - name: key-auth
    config:
      key_names:
        - api-key
        - x-api-key
      hide_credentials: true
      run_on_preflight: true

  # --- CORS ---
  - name: cors
    config:
      origins:
        - https://app.qelera.io
        - https://admin.qelera.io
        - http://localhost:3000
      methods:
        - GET
        - POST
        - PUT
        - DELETE
        - PATCH
        - OPTIONS
      headers:
        - Authorization
        - Content-Type
        - X-Request-ID
        - X-API-Key
      exposed_headers:
        - X-Request-ID
        - X-RateLimit-Remaining
        - X-RateLimit-Reset
      credentials: true
      max_age: 3600
      preflight_continue: false

  # --- Request Size Limiting ---
  - name: request-size-limiting
    config:
      allowed_payload_size: 10  # MB
      size_unit: megabytes

  # --- Request Transformation ---
  - name: request-transformer
    config:
      add:
        headers:
          - X-Forwarded-Proto:https
          - X-Forwarded-For:$remote_addr
          - X-Request-ID:$request_id
          - X-Kong-Upstream-Latency:$upstream_latency

  # --- Response Transformation ---
  - name: response-transformer
    config:
      add:
        headers:
          - X-Content-Type-Options: nosniff
          - X-Frame-Options: DENY
          - X-XSS-Protection: 1; mode=block
          - Strict-Transport-Security: max-age=31536000; includeSubDomains
          - Referrer-Policy: strict-origin-when-cross-origin
          - Content-Security-Policy: default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'

  # --- ACL (Access Control Lists) ---
  - name: acl
    config:
      whitelist:
        - backend-services
        - monitoring
        - admin

  # --- Pre Function Plugin (Custom Auth Validation) ---
  - name: pre-function
    config:
      lua_require_path: /usr/local/share/lua/5.1/?.lua;/usr/local/share/lua/5.1/?/init.lua
      accessed_upstream: false
      accessed_consumer: false
      accessed_service: false
      accessed_route: false
      included_in_response_phase: false
      included_in_header_filter_phase: false
      included_in_body_filter_phase: false
      included_in_trailer_filter_phase: false
      included_in_log_phase: false
      included_in_rewrite_phase: true
      included_in_access_phase: true
      included_in_post_rewrite_phase: false
      included_in_error_phase: false
      worker_connections: 1024
      init_worker: []
      rewrite: []
      access:
        - if kong.request.get_header("x-api-key") then
            -- API key validation logic
            return
          end
      header_filter: []
      body_filter: []
      trailer_filter: []
      log: []

  # --- Bot Detection ---
  - name: bot-detection
    config:
      enable_captcha: true
      captcha_sites_key: "6LeIxAcTAAAAAJcZVRqyHh71UMIEGNQ_MXjiZKhI"
      captcha_secret_key: "6LeIxAcTAAAAAGG-vFI1TnRWxMZNFuojJ4WifJWe"
      captcha_timeout: 300
      captcha_max_attempts: 5
      bot_user_agents:
        - "python-requests"
        - "curl"
        - "wget"
        - "scrapy"
        - "phantomjs"
        - "selenium"

  # --- IP Restriction ---
  - name: ip-restriction
    config:
      allow:
        - 0.0.0.0/0  # Allow all (restrict in prod via environment)
      deny:
        - 10.0.0.0/8   # Internal
        - 172.16.0.0/12 # Internal
        - 192.168.0.0/16 # Internal

# ============================================================
# CONSUMERS (API Key Holders)
# ============================================================

consumers:
  - username: admin@qelera.io
    keyauth_credentials:
      - key: vt_live_admin001
        description: Admin API Key
    jwt_secrets:
      - secret: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.admin.secret
        key: admin@qelera.io
    plugins:
      - name: rate-limiting
        config:
          minute: 10000
          hour: 500000

  - username: dev@qelera.io
    keyauth_credentials:
      - key: vt_live_dev001
        description: Development API Key
    plugins:
      - name: rate-limiting
        config:
          minute: 1000
          hour: 50000

