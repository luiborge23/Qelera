# ============================================================
# UPSTREAMS (Load Balancing)
# ============================================================

upstreams:
  - name: backend-api-upstream
    algorithm: round-robin
    hash_on: none
    healthchecks:
      active:
        http_path: /healthz
        timeout: 5
        healthy:
          interval: 10
          successes: 2
        unhealthy:
          interval: 5
          http_failures: 3
    targets:
      - target: backend-1:8000
        weight: 100
      - target: backend-2:8000
        weight: 100
      - target: backend-3:8000
        weight: 100

